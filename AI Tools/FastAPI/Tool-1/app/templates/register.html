{% extends 'base.html' %}

{% block title %}Register - All-in-One AI Platform{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="px-8 py-6 mt-4 text-left bg-white shadow-lg rounded-lg max-w-md w-full">
        <h3 class="text-2xl font-bold text-center">Create Your Account</h3>
        {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mt-4" role="alert">
            <span class="block sm:inline">{{ error }}</span>
        </div>
        {% endif %}
        <form action="/auth/register" method="post" class="mt-4">
            <div class="mt-4">
                <div>
                    <label class="block" for="username">Username</label>
                    <input type="text" name="username" id="username" placeholder="Username" required
                        class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-1 focus:ring-indigo-600">
                </div>
                <div class="mt-4">
                    <label class="block" for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="Email" required
                        class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-1 focus:ring-indigo-600">
                </div>
                <div class="mt-4">
                    <label class="block" for="full_name">Full Name</label>
                    <input type="text" name="full_name" id="full_name" placeholder="Full Name" required
                        class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-1 focus:ring-indigo-600">
                </div>
                <div class="mt-4">
                    <label class="block" for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="Password" required
                        class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-1 focus:ring-indigo-600">
                </div>
                <div class="mt-4">
                    <label class="block" for="confirm_password">Confirm Password</label>
                    <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required
                        class="w-full px-4 py-2 mt-2 border rounded-md focus:outline-none focus:ring-1 focus:ring-indigo-600">
                </div>
                <div class="flex items-baseline justify-between mt-4">
                    <button class="px-6 py-2 mt-4 text-white bg-indigo-600 rounded-lg hover:bg-indigo-700">Register</button>
                    <a href="/auth/login" class="text-sm text-indigo-600 hover:underline">Already have an account?</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
