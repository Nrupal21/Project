{% extends "admin/base.html" %}

{% block extrastyle %}
{{ block.super }}
<style>
:root {
    /* Primary Colors */
    --primary: #4f46e5;
    --primary-hover: #4338ca;
    --primary-light: #eef2ff;
    --primary-dark: #3730a3;
    
    /* Neutral Colors */
    --white: #ffffff;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-800: #1f2937;
    --gray-900: #111827;
    
    /* Semantic Colors */
    --success: #10b981;
    --success-light: #d1fae5;
    --warning: #f59e0b;
    --warning-light: #fef3c7;
    --error: #ef4444;
    --error-light: #fee2e2;
    --info: #3b82f6;
    --info-light: #dbeafe;
}

/* Custom scrollbar */
::-webkit-scrollbar {
    width: 4px;
    height: 4px;
    transition: all 0.3s ease;
}

::-webkit-scrollbar-track {
    background: transparent;
    border-radius: 2px;
}

::-webkit-scrollbar-thumb {
    background: rgba(79, 70, 229, 0.4);
    border-radius: 4px;
    transition: all 0.3s ease;
}

::-webkit-scrollbar-thumb:hover {
    background: rgba(79, 70, 229, 0.6);
    width: 6px;
}

/* Admin overrides */
#header {
    background: var(--primary);
    color: var(--white);
}

#branding h1, #branding h1 a:link, #branding h1 a:visited {
    color: var(--white);
}

.module h2, .module caption, .inline-group h2 {
    background: var(--primary);
}

a:link, a:visited {
    color: var(--primary);
}

a:hover {
    color: var(--primary-hover);
}

.button, input[type=submit], input[type=button], .submit-row input, a.button {
    background: var(--primary);
    color: var(--white);
}

.button:hover, input[type=submit]:hover, input[type=button]:hover, .submit-row input:hover, a.button:hover {
    background: var(--primary-hover);
}

.object-tools a:focus, .object-tools a:hover {
    background-color: var(--primary-hover);
}

.selector-changelink, .selector-remove, .selector-removeall, .selector-add, .selector-chooseall {
    background: var(--primary);
    color: var(--white);
}

.selector-changelink:hover, .selector-remove:hover, .selector-removeall:hover, .selector-add:hover, .selector-chooseall:hover {
    background: var(--primary-hover);
}

/* Responsive adjustments */
@media (max-width: 1024px) {
    #header {
        padding: 0 10px;
    }
    
    #content {
        padding: 10px;
    }
}
</style>
{% endblock %}
