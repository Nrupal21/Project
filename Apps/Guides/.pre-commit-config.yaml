repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-added-large-files  # Prevent large files from being committed
      - id: check-ast  # Check that files parse as valid Python
      - id: check-byte-order-marker  # Forbid files with a UTF-8 byte-order marker
      - id: check-case-conflict  # Check for files with names that would conflict on case-insensitive filesystems
      - id: check-docstring-first  # Checks a common error of defining a docstring after code
      - id: check-json  # Check JSON files for parse errors
      - id: check-merge-conflict  # Check for files that contain merge conflict strings
      - id: check-toml  # Check TOML files for parse errors
      - id: check-yaml  # Check YAML files for parse errors
      - id: debug-statements  # Check for debugger imports and breakpoint() calls in Python source
      - id: detect-private-key  # Detects the presence of private keys in the repository
      - id: end-of-file-fixer  # Ensure files end with a newline and only one newline at the end
      - id: mixed-line-ending  # Replaces or checks mixed line ending
        args: [--fix=lf]
      - id: requirements-txt-fixer  # Sorts entries in requirements.txt
      - id: trailing-whitespace  # Trims trailing whitespace

  - repo: https://github.com/ambv/black
    rev: 23.3.0
    hooks:
      - id: black
        language_version: python3.9
        args: [--line-length=88]

  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        name: isort (python)
        args: [--profile=black, --filter-files]

  - repo: https://github.com/pycqa/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        additional_dependencies: [flake8-bugbear==23.3.23]

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.0.272
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.3.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-python-dateutil>=2.8.0
          - types-pytz>=2023.3.0
          - types-requests>=2.28.11
          - types-PyYAML>=6.0.0
          - django-stubs>=4.1.0
          - djangorestframework-stubs>=3.14.0
          - types-pillow>=9.3.0
          - types-redis>=4.5.0
        args: [--strict, --ignore-missing-imports]
        exclude: ^tests/|^migrations/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.0.0-alpha.4
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, html, css, scss, yaml, md, markdown, mdx]
        additional_dependencies:
          - prettier@3.0.0-alpha.4
          - @prettier/plugin-xml@3.2.0
          - prettier-plugin-tailwindcss@0.4.0

  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black-jupyter
        name: black-nb
        description: "Format Jupyter notebooks with black"
        entry: black
        language: python
        types: [jupyter]
        require_serial: true
        args: [--line-length=88, --target-version=py39]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v2.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []  # Optional: customize the args for the hook

  - repo: https://github.com/codespell-project/codespell
    rev: v2.2.4
    hooks:
      - id: codespell
        args: [--ignore-words-list=ba,te,hsa,fo,nd]

  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v6.31.1
    hooks:
      - id: cspell
        args: [--config=./.cspell.json]
        exclude: >-
          (?x)^(
            .*/\.git/.*|
            .*/\.mypy_cache/.*|
            .*/\.pytest_cache/.*|
            .*/node_modules/.*|
            .*/venv/.*|
            .*/\.venv/.*|
            .*/build/.*|
            .*/dist/.*|
            .*/\.eggs/.*
          )$

  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.16
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm
          - mdformat-toc
        args: [--wrap=88, --end-of-line=lf]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.33.0
    hooks:
      - id: markdownlint
        args: [--fix, --ignore .github/]
        exclude: >-
          (?x)^(
            .*/\.git/.*|
            .*/\.mypy_cache/.*|
            .*/\.pytest_cache/.*|
            .*/node_modules/.*|
            .*/venv/.*|
            .*/\.venv/.*|
            .*/build/.*|
            .*/dist/.*
          )$
