<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
    <!-- Background Pattern -->
    <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a73e8" stroke-width="0.5" opacity="0.1"/>
        </pattern>
    </defs>
    <rect width="800" height="600" fill="url(#grid)"/>
    
    <!-- Main Workspace Window -->
    <rect x="100" y="50" width="600" height="400" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
    
    <!-- Window Header -->
    <rect x="100" y="50" width="600" height="40" rx="8" fill="#f8f9fa"/>
    <circle cx="130" cy="70" r="6" fill="#ea4335"/>
    <circle cx="150" cy="70" r="6" fill="#fbbc04"/>
    <circle cx="170" cy="70" r="6" fill="#34a853"/>
    
    <!-- Code Editor Section -->
    <rect x="120" y="110" width="280" height="320" rx="4" fill="#f8f9fa"/>
    <g fill="#1a73e8" opacity="0.7" font-family="monospace" font-size="12">
        <text x="135" y="140">function generateAI() {</text>
        <text x="150" y="160">const model = new AI({</text>
        <text x="165" y="180">type: 'assistant',</text>
        <text x="165" y="200">capabilities: [</text>
        <text x="180" y="220">'code',</text>
        <text x="180" y="240">'chat',</text>
        <text x="180" y="260">'design'</text>
        <text x="165" y="280">]</text>
        <text x="150" y="300">});</text>
        <text x="150" y="320">return model;</text>
        <text x="135" y="340">}</text>
    </g>
    
    <!-- AI Output Section -->
    <rect x="420" y="110" width="260" height="320" rx="4" fill="#f8f9fa"/>
    
    <!-- AI Response Bubbles -->
    <g>
        <rect x="435" y="130" width="230" height="60" rx="8" fill="#e8f0fe"/>
        <text x="450" y="160" fill="#1a73e8" font-size="12">Analyzing code structure...</text>
    </g>
    
    <g>
        <rect x="435" y="200" width="230" height="60" rx="8" fill="#e8f0fe"/>
        <text x="450" y="230" fill="#1a73e8" font-size="12">Generating optimizations...</text>
    </g>
    
    <g>
        <rect x="435" y="270" width="230" height="60" rx="8" fill="#e8f0fe"/>
        <text x="450" y="300" fill="#1a73e8" font-size="12">Suggesting improvements...</text>
    </g>
    
    <!-- Floating Elements -->
    <g transform="translate(650, 480)">
        <circle cx="0" cy="0" r="30" fill="#1a73e8" opacity="0.1"/>
        <path d="M-15 0h30M0 -15v30" stroke="#1a73e8" stroke-width="4" stroke-linecap="round"/>
    </g>
    
    <g transform="translate(150, 480)">
        <circle cx="0" cy="0" r="25" fill="#fbbc04" opacity="0.1"/>
        <circle cx="0" cy="0" r="12" fill="#fbbc04" opacity="0.2"/>
    </g>
    
    <g transform="translate(400, 500)">
        <rect x="-20" y="-20" width="40" height="40" transform="rotate(45)" fill="#34a853" opacity="0.1"/>
    </g>
</svg> 